<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Ahrefs Script</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="logo-container">
                <img src="image.png" alt="Ahrefwaly Logo" class="logo">
            </div>
            <h2>Ahrefs Tool</h2>
            <button onclick="logout()" class="btn-secondary">Logout</button>
        </div>
    </nav>
    <div class="container">
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-label">Keywords Used</div>
                <div class="stat-value" id="keywordsUsed">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Keywords Remaining</div>
                <div class="stat-value" id="keywordsRemaining">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Limit</div>
                <div class="stat-value" id="totalLimit">-</div>
            </div>
        </div>

        <div class="iframe-container">
            <div id="loadingIndicator" class="loading">Loading Ahrefs...</div>
            <div id="errorMessage" class="error-card" style="display: none;"></div>
            <div id="limitBlocked" class="limit-blocked" style="display: none;">
                <h2>Limit Reached</h2>
                <p>You have reached your keyword limit. Please contact your administrator.</p>
            </div>
            <iframe id="ahrefsFrame" src="" style="display: none;"></iframe>
        </div>
    </div>
    <footer class="footer">
        <p id="brandingText">Loading...</p>
    </footer>
    <script src="js/auth.js"></script>
    <script src="js/user-dashboard.js"></script>
</body>
</html>
